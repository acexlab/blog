<div class="container py-5">
  <div class="row justify-content-center g-4">
    <div class="col-12 col-lg-8">
      <div class="card shadow-sm border-0">
        <div class="card-body p-4 p-md-5">
          <div class="mb-4">
            <span class="badge text-bg-warning mb-2">Editing existing post</span>
            <h3 class="mb-1">Update Blog</h3>
            <p class="text-muted mb-0">Sample data prefilled for a blog currently in review.</p>
          </div>

          <form>
            <div class="mb-3">
              <label class="form-label">Blog Id</label>
              <input type="number" class="form-control" value="1024">
            </div>

            <div class="mb-3">
              <label class="form-label">Title</label>
              <input type="text" class="form-control" value="Refining the navbar and route structure">
            </div>

            <div class="mb-3">
              <label class="form-label">Contents</label>
              <textarea rows="8" class="form-control">Updated body copy: the navbar now uses matching routes, the collapse button is wired, and the page shows the correct outlet only once.</textarea>
            </div>

            <div class="d-flex gap-2 flex-wrap">
              <button class="btn btn-warning">Update Blog</button>
              <button type="button" class="btn btn-outline-secondary">Save as Draft</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <div class="col-12 col-lg-4">
      <div class="card shadow-sm h-100">
        <div class="card-body">
          <h5 class="card-title">Revision Notes</h5>
          <ul class="mb-0 ps-3 text-muted">
            <li>Added visible sample copy</li>
            <li>Adjusted routes to match navbar links</li>
            <li>Kept the layout simple and readable</li>
          </ul>
        </div>
      </div>
    </div>
  </div>
</div>
